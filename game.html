    <main>
        <!-- Секция 6: Анимированный мяч -->
        <section>
            <h1>Interactive: Bouncing Ball & Game</h1>
            <div id="ball-container">
                <div id="ball"></div>
            </div>
            <button id="bounceBtn">Start Bouncing</button>
        </section>

        <hr>

        <!-- Секция 6: Игра в угадывание -->
        <section>
            <h3>Guessing Game</h3>
            <p>I am thinking of a number between 1 and 10.</p>
            <input type="number" id="userGuess" placeholder="Enter number">
            <button id="checkGuessBtn">Guess!</button>
            <p id="gameFeedback"></p>
        </section>
    </main>

    <footer>
