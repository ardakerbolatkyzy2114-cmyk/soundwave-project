<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Practice 1 - Form Validation</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; padding: 40px; background: #f4f7f6; }
        .form-container { background: white; padding: 20px; border-radius: 8px; max-width: 400px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        input { display: block; width: 100%; margin-top: 10px; padding: 10px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; }
        .msg { font-size: 0.85rem; margin-top: 5px; min-height: 1.2rem; }
        button { margin-top: 15px; padding: 10px 20px; cursor: pointer; border: none; border-radius: 4px; transition: 0.3s; }
        #submitBtn { background: #2ecc71; color: white; }
        #clearBtn { background: #e74c3c; color: white; }
    </style>
</head>
<body>

<div class="form-container">
    <h2>Register</h2>
    <form id="regForm">
        <input type="text" id="userName" placeholder="Name">
        <div id="nameMsg" class="msg"></div>

        <input type="email" id="userEmail" placeholder="Email">
        <div id="emailMsg" class="msg"></div>

        <input type="password" id="userPass" placeholder="Password (min 6 chars)">
        <div id="passMsg" class="msg"></div>

        <button type="submit" id="submitBtn">Submit Form</button>
        <button type="button" id="clearBtn">Clear</button>
    </form>
    <div id="formStatus" style="margin-top: 15px; font-weight: bold;"></div>
</div>

<script src="validation-logic.js"></script>
</body>
</html>
